[package]
name = "lyrics-helper"
version = "0.1.4"
edition = "2024"
description = "Lyrics toolset with parsers, generators, decrypters, searchers and useful helpers."
license = "Apache-2.0"
authors = ["ChouChiu"]

[lib]
name = "lyrics_helper"
path = "src/lib.rs"

[[example]]
name = "demo"
path = "examples/demo.rs"

[[example]]
name = "search_test"
path = "examples/search_test.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
regex = "1"
quick-xml = "0.36"
flate2 = "1"
base64 = "0.22"
once_cell = "1"
reqwest = { version = "0.12", features = ["json", "rustls-tls"], optional = true }
tokio = { version = "1", features = ["full"], optional = true }
aes = "0.8"
cbc = "0.1"
ecb = "0.1"
md-5 = "0.10"
des = "0.8"
async-trait = "0.1"
urlencoding = "2"
rand = "0.8"

[dev-dependencies]
pretty_assertions = "1"

[features]
default = ["search"]
search = ["reqwest", "tokio"]
